services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://kurir:kurir@postgres:5432/kurir?connection_limit=15
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      - NEXTAUTH_URL=http://localhost:3000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev-encryption-key-change-in-production}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-Kurir}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-localhost}
      - UPDATER_URL=http://updater:8080
      - UPDATER_TOKEN=${UPDATER_TOKEN:-dev-updater-token-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    stdin_open: true
    tty: true

  updater:
    build:
      context: ./docker/updater
    environment:
      APP_URL: http://app:3000
      UPDATER_TOKEN: ${UPDATER_TOKEN:-dev-updater-token-change-in-production}
      WORKDIR: /workdir
      COMPOSE_FILE: docker-compose.yml
      APP_SERVICE: app
      # Dev builds the app image locally, so skip the pull step — the
      # "Update Now" button will just recreate the app container against the
      # current build.
      SKIP_PULL: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workdir

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kurir
      POSTGRES_PASSWORD: kurir
      POSTGRES_DB: kurir
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kurir"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
