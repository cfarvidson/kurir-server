# Name of your application. Used to uniquely configure containers.
service: kurir

# Name of the container image.
image: cfarvidson/kurir

# Deploy to these servers.
servers:
  web:
    hosts:
      - kurir-app-1.banded-beta.ts.net
    options:
      memory: 8192m

proxy:
  ssl: false
  app_port: 3000
  response_timeout: 120
  healthcheck:
    path: /api/up

# Credentials for your image host.
registry:
  server: docker-registry.banded-beta.ts.net
  username:
    - DOCKER_REGISTRY_TOKEN
  password:
    - DOCKER_REGISTRY_TOKEN

# Configure builder setup.
builder:
  arch: amd64
  dockerfile: ./Dockerfile
  context: .
  args:
    NEXT_PUBLIC_VAPID_PUBLIC_KEY: BPaSrHVytY_NJEq5tdKs9COC0bXzovmSn0Wl8VbeAMrYZIGY6Iy2y8F4bc9sGjA5B_Vd9VDO6e0zKXyCOvXX2sg

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  clear:
    NODE_ENV: production
    WEBAUTHN_RP_NAME: Kurir
    WEBAUTHN_RP_ID: kurir-app-1.banded-beta.ts.net
    NEXTAUTH_URL: https://kurir-app-1.banded-beta.ts.net
    NEXT_PUBLIC_VAPID_PUBLIC_KEY: BPaSrHVytY_NJEq5tdKs9COC0bXzovmSn0Wl8VbeAMrYZIGY6Iy2y8F4bc9sGjA5B_Vd9VDO6e0zKXyCOvXX2sg
  secret:
    - DATABASE_URL
    - NEXTAUTH_SECRET
    - ENCRYPTION_KEY
    - VAPID_PRIVATE_KEY
    - REDIS_URL
    - MICROSOFT_CLIENT_ID
    - MICROSOFT_CLIENT_SECRET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET

# Use accessory services (secrets come from .kamal/secrets).
accessories:
  db:
    image: postgres:16-alpine
    host: kurir-app-1.banded-beta.ts.net
    port: 5432
    env:
      clear:
        POSTGRES_DB: kurir
        POSTGRES_USER: kurir
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    host: kurir-redis-1.banded-beta.ts.net
    port: 6379
    cmd: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    directories:
      - data:/data
