name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-amd64-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          target: runner
          build-args: |
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          cache-from: type=gha,scope=buildkit-amd64
          cache-to: type=gha,scope=buildkit-amd64,mode=max

  build-arm64:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-arm64-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          target: runner
          build-args: |
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          cache-from: type=gha,scope=buildkit-arm64
          cache-to: type=gha,scope=buildkit-arm64,mode=max

  publish:
    needs: [build-amd64, build-arm64]
    if: always() && needs.build-amd64.result == 'success' && (needs.build-arm64.result == 'success' || needs.build-arm64.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create multi-arch manifest
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          SOURCES="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-amd64-${{ github.sha }}"
          if [ "${{ needs.build-arm64.result }}" = "success" ]; then
            SOURCES="$SOURCES ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-arm64-${{ github.sha }}"
          fi
          for TAG in $TAGS; do
            docker buildx imagetools create -t "$TAG" $SOURCES
          done

      - name: Clean up build tags
        run: |
          TOKEN=$(echo ${{ secrets.GITHUB_TOKEN }} | base64)
          # Build tags are temporary; they'll be overwritten on next push
          echo "Intermediate build tags will be overwritten on next run"
